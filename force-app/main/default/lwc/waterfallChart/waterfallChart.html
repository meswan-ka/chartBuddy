<template>
    <div class="chart-container">
        <template lwc:if={hasData}>
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="chart-svg"
                 viewBox={viewBox}
                 preserveAspectRatio="xMidYMid meet"
                 role="img"
                 aria-label={chartTitle}>

                <!-- Grid lines -->
                <template for:each={gridLines} for:item="line">
                    <line key={line.key}
                          x1={line.x1} y1={line.y1}
                          x2={line.x2} y2={line.y2}
                          class="grid-line"></line>
                </template>

                <!-- Connector lines between bars -->
                <template for:each={connectors} for:item="conn">
                    <line key={conn.key}
                          x1={conn.x1} y1={conn.y1}
                          x2={conn.x2} y2={conn.y2}
                          class="connector-line"></line>
                </template>

                <!-- Bars -->
                <template for:each={bars} for:item="bar">
                    <rect key={bar.key}
                          x={bar.x} y={bar.y}
                          width={bar.width} height={bar.barHeight}
                          rx="2" ry="2"
                          style={bar.style}></rect>
                </template>

                <!-- Y-axis labels -->
                <template for:each={yAxisLabels} for:item="label">
                    <text key={label.key}
                          x={label.x} y={label.y}
                          text-anchor="end"
                          font-size="11"
                          class="axis-label">{label.text}</text>
                </template>

                <!-- X-axis labels (rotated) -->
                <template for:each={xAxisLabels} for:item="label">
                    <text key={label.key}
                          x={label.x} y={label.y}
                          text-anchor="end"
                          font-size="11"
                          class="axis-label"
                          transform={label.transform}>{label.text}</text>
                </template>

                <!-- Y axis line -->
                <line x1="60" y1="20"
                      x2="60" y2={chartBottom}
                      class="axis-line"></line>

                <!-- X axis line -->
                <line x1="60" y1={chartBottom}
                      x2="480" y2={chartBottom}
                      class="axis-line"></line>

                <!-- Chart title -->
                <template lwc:if={chartTitle}>
                    <text x="270" y={titleY}
                          text-anchor="middle"
                          font-size="13"
                          class="chart-title-text">{chartTitle}</text>
                </template>
            </svg>
        </template>

        <template lwc:if={isLoading}>
            <div class="loading">
                <lightning-spinner alternative-text="Loading chart data" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={errorMessage}>
            <div class="error-message">{errorMessage}</div>
        </template>
    </div>
</template>
