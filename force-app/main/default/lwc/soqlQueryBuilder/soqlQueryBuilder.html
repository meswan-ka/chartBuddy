<template>
    <div class="builder-section">
        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <lightning-button-group>
                <lightning-button
                    label="Builder"
                    variant={builderModeVariant}
                    onclick={handleBuilderMode}
                ></lightning-button>
                <lightning-button
                    label="Raw SOQL"
                    variant={rawModeVariant}
                    onclick={handleRawMode}
                ></lightning-button>
            </lightning-button-group>
        </div>

        <!-- Raw Mode -->
        <template lwc:if={isRawMode}>
            <lightning-textarea
                label="SOQL Query"
                value={rawQuery}
                onchange={handleRawQueryChange}
                class="slds-m-bottom_small"
            ></lightning-textarea>
        </template>

        <!-- Builder Mode -->
        <template lwc:else>
            <!-- Query Source -->
            <div class="builder-card">
                <div class="builder-card-header">Query Source</div>
                <div class="object-search slds-m-bottom_small">
                    <lightning-input
                        label="SObject"
                        value={objectSearchTerm}
                        placeholder="Type an object name to search..."
                        field-level-help="The Salesforce object to query (e.g. Opportunity, Case)"
                        onchange={handleObjectSearchInput}
                        onblur={handleObjectSearchBlur}
                    ></lightning-input>
                    <template lwc:if={showObjectDropdown}>
                        <div class="object-dropdown">
                            <template for:each={objectSearchResults} for:item="obj">
                                <div
                                    key={obj.apiName}
                                    class="object-option"
                                    data-apiname={obj.apiName}
                                    onclick={handleObjectSelect}
                                >
                                    <span>{obj.label}</span>
                                    <span class="object-option-api">{obj.apiName}</span>
                                    <template lwc:if={obj.isCustom}>
                                        <lightning-badge label="Custom"></lightning-badge>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
                <div class="record-context-row">
                    <div class="record-context-field">
                        <lightning-combobox
                            label="Bind to Current Record"
                            value={recordContextField}
                            options={recordContextOptions}
                            field-level-help="Filters query results to the record this chart is placed on. Select the lookup field that points to the parent record (e.g. AccountId)."
                            onchange={handleRecordContextChange}
                        ></lightning-combobox>
                    </div>
                    <template lwc:if={recordContextField}>
                        <span class="record-context-label">= :recordId</span>
                    </template>
                </div>
            </div>

            <!-- SELECT Columns: Dynamic Mode (multi-field charts) -->
            <template lwc:if={isDynamicMode}>
                <div class="builder-card">
                    <div class="builder-card-header">
                        <span>SELECT Columns</span>
                        <lightning-button
                            label="Add Column"
                            variant="neutral"
                            icon-name="utility:add"
                            onclick={handleAddField}
                            size="small"
                        ></lightning-button>
                    </div>
                    <div class="fields-help-text">{fieldsHelpText}</div>
                    <template for:each={renderedFields} for:item="field">
                        <div key={field.id} class="field-row">
                            <div class="field-row-role">
                                <span class="field-role-badge" data-role={field.roleLabel}>{field.roleLabel}</span>
                            </div>
                            <div class="field-row-aggregate">
                                <lightning-combobox
                                    label="Aggregate"
                                    variant="label-hidden"
                                    value={field.aggregate}
                                    options={aggregateOptions}
                                    data-index={field.index}
                                    onchange={handleAggregateChange}
                                    placeholder="None"
                                ></lightning-combobox>
                            </div>
                            <div class="field-row-field">
                                <template lwc:if={field.showCustomInput}>
                                    <lightning-input
                                        label="Relationship Path"
                                        variant="label-hidden"
                                        value={field.fieldName}
                                        placeholder="e.g. Account.Industry"
                                        data-index={field.index}
                                        onchange={handleCustomFieldInput}
                                    ></lightning-input>
                                </template>
                                <template lwc:else>
                                    <lightning-combobox
                                        label="Field"
                                        variant="label-hidden"
                                        value={field.fieldName}
                                        options={fieldPickerOptions}
                                        data-index={field.index}
                                        onchange={handleFieldChange}
                                        placeholder="Select a field..."
                                    ></lightning-combobox>
                                </template>
                                <span
                                    class="custom-field-toggle"
                                    data-key={field.id}
                                    onclick={handleCustomFieldToggle}
                                >
                                    <template lwc:if={field.showCustomInput}>
                                        Use field picker
                                    </template>
                                    <template lwc:else>
                                        Relationship path
                                    </template>
                                </span>
                            </div>
                            <div class="field-row-alias">
                                <template lwc:if={field.alias}>
                                    <span class="alias-text">as {field.alias}</span>
                                </template>
                            </div>
                            <div class="field-row-remove">
                                <template lwc:if={field.isRemovable}>
                                    <lightning-button-icon
                                        icon-name="utility:close"
                                        alternative-text="Remove column"
                                        variant="bare"
                                        data-index={field.index}
                                        onclick={handleRemoveField}
                                        size="small"
                                    ></lightning-button-icon>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- SELECT Columns: Single Mode (gauges) -->
            <template lwc:if={isSingleMode}>
                <div class="builder-card">
                    <div class="builder-card-header">SELECT Column</div>
                    <div class="fields-help-text">{fieldsHelpText}</div>
                    <div class="single-field-row">
                        <div class="single-field-label">{singleFieldLabel}</div>
                        <div class="single-field-aggregate">
                            <lightning-combobox
                                label="Aggregate Function"
                                variant="label-hidden"
                                value={singleField.aggregate}
                                options={aggregateOptionsRequired}
                                data-index="0"
                                onchange={handleAggregateChange}
                            ></lightning-combobox>
                        </div>
                        <div class="single-field-picker">
                            <template lwc:if={singleField.showCustomInput}>
                                <lightning-input
                                    label="Relationship Path"
                                    variant="label-hidden"
                                    value={singleField.fieldName}
                                    placeholder="e.g. Account.AnnualRevenue"
                                    data-index="0"
                                    onchange={handleCustomFieldInput}
                                ></lightning-input>
                            </template>
                            <template lwc:else>
                                <lightning-combobox
                                    label="Field"
                                    variant="label-hidden"
                                    value={singleField.fieldName}
                                    options={fieldPickerOptions}
                                    data-index="0"
                                    onchange={handleFieldChange}
                                    placeholder="Select a field..."
                                ></lightning-combobox>
                            </template>
                            <span
                                class="custom-field-toggle"
                                data-key={singleField.id}
                                onclick={handleCustomFieldToggle}
                            >
                                <template lwc:if={singleField.showCustomInput}>
                                    Use field picker
                                </template>
                                <template lwc:else>
                                    Relationship path
                                </template>
                            </span>
                        </div>
                        <div class="single-field-alias">
                            <template lwc:if={singleField.alias}>
                                <span class="alias-text">as {singleField.alias}</span>
                            </template>
                        </div>
                    </div>
                </div>
            </template>

            <!-- WHERE Filters -->
            <div class="builder-card">
                <div class="builder-card-header">
                    <span>WHERE Filters</span>
                    <lightning-button
                        label="Add Filter"
                        variant="neutral"
                        icon-name="utility:add"
                        onclick={handleAddWhereCondition}
                        size="small"
                    ></lightning-button>
                </div>
                <template lwc:if={hasWhereConditions}>
                    <template for:each={renderedWhereConditions} for:item="cond">
                        <div key={cond.id} class="where-row">
                            <div class="where-field">
                                <lightning-combobox
                                    label="Filter Field"
                                    variant="label-hidden"
                                    value={cond.fieldName}
                                    options={fieldPickerOptions}
                                    data-index={cond.index}
                                    onchange={handleWhereFieldChange}
                                    placeholder="Select field..."
                                ></lightning-combobox>
                            </div>
                            <div class="where-operator">
                                <lightning-combobox
                                    label="Comparison"
                                    variant="label-hidden"
                                    value={cond.operator}
                                    options={operatorOptions}
                                    data-index={cond.index}
                                    onchange={handleWhereOperatorChange}
                                ></lightning-combobox>
                            </div>
                            <template lwc:if={cond.needsValue}>
                                <div class="where-value-type">
                                    <lightning-combobox
                                        label="Value Type"
                                        variant="label-hidden"
                                        value={cond.valueType}
                                        options={valueTypeOptions}
                                        data-index={cond.index}
                                        onchange={handleWhereValueTypeChange}
                                    ></lightning-combobox>
                                </div>
                                <div class="where-value">
                                    <template lwc:if={cond.isDateValue}>
                                        <lightning-combobox
                                            label="Date Literal"
                                            variant="label-hidden"
                                            value={cond.dateLiteralBase}
                                            options={dateLiteralOptions}
                                            data-index={cond.index}
                                            onchange={handleWhereDateLiteralChange}
                                            placeholder="Select date literal..."
                                        ></lightning-combobox>
                                    </template>
                                    <template lwc:else>
                                        <lightning-input
                                            label="Compare To"
                                            variant="label-hidden"
                                            value={cond.value}
                                            data-index={cond.index}
                                            onchange={handleWhereValueChange}
                                            placeholder="Value or 'string'..."
                                        ></lightning-input>
                                    </template>
                                </div>
                                <template lwc:if={cond.needsN}>
                                    <div class="where-n">
                                        <lightning-input
                                            type="number"
                                            label="N"
                                            variant="label-hidden"
                                            value={cond.dateLiteralN}
                                            data-index={cond.index}
                                            onchange={handleWhereDateNChange}
                                            min="1"
                                            placeholder="n"
                                        ></lightning-input>
                                    </div>
                                </template>
                            </template>
                            <div class="where-remove">
                                <lightning-button-icon
                                    icon-name="utility:close"
                                    alternative-text="Remove filter"
                                    variant="bare"
                                    data-index={cond.index}
                                    onclick={handleRemoveWhereCondition}
                                    size="small"
                                ></lightning-button-icon>
                            </div>
                        </div>
                    </template>
                </template>
            </div>

            <!-- ORDER BY + LIMIT -->
            <template lwc:if={showOrderBy}>
                <div class="builder-card">
                    <div class="builder-card-header">Row Ordering</div>
                    <div class="order-limit-row">
                        <div class="order-group">
                            <div class="order-field">
                                <lightning-combobox
                                    label="Sort By"
                                    value={orderByField}
                                    options={fieldPickerOptions}
                                    onchange={handleOrderByFieldChange}
                                    placeholder="-- None --"
                                ></lightning-combobox>
                            </div>
                            <div class="order-direction">
                                <lightning-combobox
                                    label="Direction"
                                    value={orderByDirection}
                                    options={directionOptions}
                                    onchange={handleOrderByDirectionChange}
                                ></lightning-combobox>
                            </div>
                        </div>
                        <template lwc:if={showLimit}>
                            <lightning-input
                                type="number"
                                label="Max Rows"
                                value={queryLimit}
                                onchange={handleLimitChange}
                                min="1"
                                placeholder="All"
                            ></lightning-input>
                        </template>
                    </div>
                </div>
            </template>

            <!-- LIMIT only -->
            <template lwc:if={showLimitOnly}>
                <div class="builder-card">
                    <div class="builder-card-header">Row Limit</div>
                    <lightning-input
                        type="number"
                        label="Max Rows"
                        value={queryLimit}
                        onchange={handleLimitChange}
                        min="1"
                        placeholder="All"
                    ></lightning-input>
                </div>
            </template>
        </template>

        <!-- Generated SOQL -->
        <div class="builder-card">
            <div class="builder-card-header">Generated SOQL</div>
            <div class="soql-preview">{soqlPreview}</div>
        </div>

        <!-- Warning Modal -->
        <template lwc:if={showWarningModal}>
            <section
                role="dialog"
                tabindex="-1"
                class="slds-modal slds-fade-in-open"
                aria-modal="true"
                aria-label="Parse warning"
            >
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Query Contains Unsupported Features</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>This query contains features the builder does not support. Switching to builder mode will remove them:</p>
                        <ul class="warning-list">
                            <template for:each={warningMessages} for:item="msg">
                                <li key={msg}>{msg}</li>
                            </template>
                        </ul>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button
                            label="Stay in Raw Mode"
                            variant="neutral"
                            onclick={handleWarningStay}
                        ></lightning-button>
                        <lightning-button
                            label="Switch Anyway"
                            variant="brand"
                            onclick={handleWarningSwitch}
                            class="slds-m-left_x-small"
                        ></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
