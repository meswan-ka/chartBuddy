<template>
    <div class="chart-container">
        <template lwc:if={hasData}>
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="chart-svg"
                 viewBox={viewBox}
                 preserveAspectRatio="xMidYMid meet"
                 role="img"
                 aria-label={chartTitle}>

                <!-- Grid lines -->
                <template for:each={gridLines} for:item="line">
                    <line key={line.key}
                          x1={line.x1} y1={line.y1}
                          x2={line.x2} y2={line.y2}
                          class="grid-line"
                          stroke-dasharray="none"></line>
                </template>

                <!-- Bars -->
                <template for:each={computedBars} for:item="bar">
                    <rect key={bar.key}
                          x={bar.x} y={bar.y}
                          width={bar.width} height={bar.height}
                          rx="3" ry="3"
                          style={bar.style}></rect>
                </template>

                <!-- X-axis labels -->
                <template for:each={xAxisLabels} for:item="label">
                    <text key={label.key}
                          x={label.x} y={label.y}
                          text-anchor={label.anchor}
                          font-size="11"
                          class="axis-label">{label.text}</text>
                </template>

                <!-- Y-axis labels -->
                <template for:each={yAxisLabels} for:item="label">
                    <text key={label.key}
                          x={label.x} y={label.y}
                          text-anchor={label.anchor}
                          font-size="11"
                          class="axis-label">{label.text}</text>
                </template>

                <!-- Axis lines -->
                <line x1={axisOrigin.x} y1={axisOrigin.y}
                      x2={axisEndX.x} y2={axisEndX.y}
                      class="axis-line"></line>
                <line x1={axisOrigin.x} y1={axisOrigin.y}
                      x2={axisEndY.x} y2={axisEndY.y}
                      class="axis-line"></line>

                <!-- Chart title -->
                <template lwc:if={chartTitle}>
                    <text x={titleX} y={titleY}
                          text-anchor="middle"
                          font-size="13"
                          class="chart-title-text">{chartTitle}</text>
                </template>
            </svg>

            <!-- Legend (multi-series only) -->
            <template lwc:if={showLegend}>
                <div class="legend">
                    <template for:each={legendItems} for:item="item">
                        <div key={item.key} class="legend-item">
                            <span class="legend-dot" style={item.dotStyle}></span>
                            <span class="legend-label">{item.label}</span>
                        </div>
                    </template>
                </div>
            </template>
        </template>

        <template lwc:if={isLoading}>
            <div class="loading">
                <lightning-spinner alternative-text="Loading chart data" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={errorMessage}>
            <div class="error-message">{errorMessage}</div>
        </template>
    </div>
</template>
